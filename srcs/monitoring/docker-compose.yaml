services:

  prometheus:
    image: prom/prometheus:v3
    container_name: prometheus
    environment:
      - CA_CRT_NAME=${CA_CRT_NAME:-ca.crt}
      - INT_CRT_NAME=${INT_CRT_NAME:-internal.crt}
      - INT_KEY_NAME=${INT_KEY_NAME:-internal.key}
      - TMPL=/etc/prometheus/templates
      - CONF=/tmp
    entrypoint: []
    command: >
      sh -xc "
      cat $$TMPL/prometheus.yml.template &&
      cat $$TMPL/web-config.yml.template &&
      sed 
      -e 's|__CA_CRT_NAME__|'$$CA_CRT_NAME'|g'
      -e 's|__INT_CRT_NAME__|'$$INT_CRT_NAME'|g'
      -e 's|__INT_KEY_NAME__|'$$INT_KEY_NAME'|g'
      $$TMPL/prometheus.yml.template > $$CONF/prometheus.yml &&
      sed 
      -e 's|__INT_CRT_NAME__|'$$INT_CRT_NAME'|g'
      -e 's|__INT_KEY_NAME__|'$$INT_KEY_NAME'|g'
      $$TMPL/web-config.yml.template > $$CONF/web-config.yml &&
      cat $$CONF/prometheus.yml &&
      cat $$CONF/web-config.yml &&
      exec 
      /bin/prometheus
      --config.file=$$CONF/prometheus.yml
      --web.config.file=$$CONF/web-config.yml
      --storage.tsdb.path=/prometheus
      "
    volumes:
      - ./prometheus/prometheus.yml.template:/etc/prometheus/templates/prometheus.yml.template:ro
      - ./prometheus/web-config.yml.template:/etc/prometheus/templates/web-config.yml.template:ro
      - certs_data:/certs:ro
      - prometheus_data:/prometheus
    restart: always
    depends_on:
      pki-init:
        condition: service_completed_successfully

  grafana:
    image: grafana/grafana:13.0
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_SERVER_PROTOCOL=https
      - GF_SERVER_CERT_FILE=/certs/${INT_CRT_NAME:-internal.crt}
      - GF_SERVER_CERT_KEY=/certs/${INT_KEY_NAME:-internal.key}
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/metrics
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SECURITY_CSRF_ADDITIONAL_HEADERS=X-Forwarded-Host
      - GF_LOG_LEVEL=error
    volumes:
      - certs_data:/certs:ro
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    restart: always
    entrypoint: []
    command: >
      sh -c "
      cp /certs/${CA_CRT_NAME:-ca.crt} /tmp/ca.crt &&
      exec /run.sh
      "
    depends_on:
      prometheus:
        condition: service_started
      pki-init:
        condition: service_completed_successfully

  mysqld-exporter:
    image: prom/mysqld-exporter:v0.19.0
    container_name: mysqld-exporter
    environment:
      - CA_CRT_NAME=${CA_CRT_NAME:-ca.crt}
      - INT_CRT_NAME=${INT_CRT_NAME:-internal.crt}
      - INT_KEY_NAME=${INT_KEY_NAME:-internal.key}
      - MYSQL_EXPORTER_USER=${MYSQL_EXPORTER_USER:-monitoring_exporter}
      - MYSQL_EXPORTER_PASSWORD=${MYSQL_EXPORTER_PASSWORD:-monitoring_exporter_change_me}
      - TMPL=/etc/mysqld-exporter/templates
      - CONF=/tmp
    entrypoint: []
    command: >
      sh -xc "
      sed
      -e 's|__MYSQL_EXPORTER_USER__|'$$MYSQL_EXPORTER_USER'|g'
      -e 's|__MYSQL_EXPORTER_PASSWORD__|'$$MYSQL_EXPORTER_PASSWORD'|g'
      -e 's|__CA_CRT_NAME__|'$$CA_CRT_NAME'|g'
      -e 's|__INT_CRT_NAME__|'$$INT_CRT_NAME'|g'
      -e 's|__INT_KEY_NAME__|'$$INT_KEY_NAME'|g'
      $$TMPL/my.cnf.template > $$CONF/.my.cnf &&
      sed
      -e 's|__INT_CRT_NAME__|'$$INT_CRT_NAME'|g'
      -e 's|__INT_KEY_NAME__|'$$INT_KEY_NAME'|g'
      $$TMPL/web-config.yml.template > $$CONF/web-config.yml &&
      chmod 600 $$CONF/.my.cnf &&
      exec /bin/mysqld_exporter
      --config.my-cnf=$$CONF/.my.cnf
      --web.config.file=$$CONF/web-config.yml
      "
    volumes:
      - ./mysqld-exporter/my.cnf.template:/etc/mysqld-exporter/templates/my.cnf.template:ro
      - ./mysqld-exporter/web-config.yml.template:/etc/mysqld-exporter/templates/web-config.yml.template:ro
      - certs_data:/certs:ro
    restart: always
    depends_on:
      database:
        condition: service_healthy
      pki-init:
        condition: service_completed_successfully

  cadvisor:
    build:
      context: ./cadvisor
      args:
        CADVISOR_VERSION: 0.56.2
    container_name: cadvisor
    init: true
    environment:
      - INT_CRT_NAME=${INT_CRT_NAME:-internal.crt}
      - INT_KEY_NAME=${INT_KEY_NAME:-internal.key}
      - NGINX_ENVSUBST_OUTPUT_DIR=/etc/nginx/conf.d
      - ENVSUBST_VARS=INT_CRT_NAME,INT_KEY_NAME
    volumes:
      - certs_data:/certs:ro
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
      - ./cadvisor/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./cadvisor/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: []
    command: >
      sh -c "
      sed
      -e 's|__INT_CRT_NAME__|'$$INT_CRT_NAME'|g'
      -e 's|__INT_KEY_NAME__|'$$INT_KEY_NAME'|g'
      /etc/nginx/templates/default.conf.template > /etc/nginx/http.d/default.conf &&
      exec /entrypoint.sh
      "
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate -q -O /dev/null https://127.0.0.1:8080/metrics || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      pki-init:
        condition: service_completed_successfully

  node-exporter:
    image: prom/node-exporter:v1.9.1
    container_name: node-exporter
    environment:
      - INT_CRT_NAME=${INT_CRT_NAME:-internal.crt}
      - INT_KEY_NAME=${INT_KEY_NAME:-internal.key}
      - TMPL=/etc/node-exporter/templates
      - CONF=/tmp
    entrypoint: []
    command: >
      sh -xc "
      sed
      -e 's|__INT_CRT_NAME__|'$$INT_CRT_NAME'|g'
      -e 's|__INT_KEY_NAME__|'$$INT_KEY_NAME'|g'
      $$TMPL/web-config.yml.template > $$CONF/web-config.yml &&
      exec /bin/node_exporter
      --web.config.file=$$CONF/web-config.yml
      --path.procfs=/host/proc
      --path.sysfs=/host/sys
      --path.rootfs=/rootfs
      "
    volumes:
      - ./node-exporter/web-config.yml.template:/etc/node-exporter/templates/web-config.yml.template:ro
      - certs_data:/certs:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    restart: always
    depends_on:
      pki-init:
        condition: service_completed_successfully

  nginx-exporter-gateway:
    build:
      context: ./nginx-exporter-gateway
      args:
        NGINX_PROMETHEUS_EXPORTER_VERSION: 1.4.2
        ALPINE_VERSION: 3.20
    container_name: nginx-exporter-gateway
    environment:
      - CA_CRT_NAME=${CA_CRT_NAME:-ca.crt}
      - INT_CRT_NAME=${INT_CRT_NAME:-internal.crt}
      - INT_KEY_NAME=${INT_KEY_NAME:-internal.key}
      - TMPL=/etc/nginx-exporter/templates
      - CONF=/tmp
    entrypoint: []
    command: >
      sh -xc "
      sed
      -e 's|__INT_CRT_NAME__|'$$INT_CRT_NAME'|g'
      -e 's|__INT_KEY_NAME__|'$$INT_KEY_NAME'|g'
      $$TMPL/web-config.yml.template > $$CONF/web-config.yml &&
      exec /bin/nginx-prometheus-exporter
      --nginx.scrape-uri=https://gateway:8443/stub_status
      --nginx.ssl-verify
      --nginx.ssl-ca-cert=/certs/$$CA_CRT_NAME
      --web.listen-address=:9113
      --web.config.file=$$CONF/web-config.yml
      "
    volumes:
      - ./nginx-exporter-gateway/web-config.yml.template:/etc/nginx-exporter/templates/web-config.yml.template:ro
      - certs_data:/certs:ro
    restart: always
    depends_on:
      gateway:
        condition: service_started
      pki-init:
        condition: service_completed_successfully

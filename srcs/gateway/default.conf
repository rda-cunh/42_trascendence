# --- Rate Limit Zones ---
limit_req_zone $binary_remote_addr zone=global_zone:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api_zone:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=heavy_zone:10m rate=1r/s;
limit_req_zone $binary_remote_addr zone=security_zone:10m rate=1r/m;

# Redirect HTTP to HTTPS
server {
    listen 80;
    return 301 https://$host$request_uri;
}

map $http_upgrade $connection_upgrade{
	default upgrade;
	''		close;
}

server {
    listen 443 ssl;

    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Set up resolver for service discovery
    resolver 127.0.0.11 valid=30s;

    # Shared proxy settings
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Rate Limiting Error Handling
    limit_req_status 429;
    error_page 429 @ratelimit;

    location @ratelimit {
        default_type application/json;
        return 429 '{"error": "Too Many Requests", "message": "You are making requests too quickly. Please slow down."}';
    }

	location = /_grafana_auth {
		internal;
        set $backend_service "https://backend:8000/api/admin/grafana/";
		proxy_pass $backend_service;
		proxy_pass_request_body off;
		proxy_set_header Content-Length "";
		proxy_set_header X-Original-URI $request_uri;
		proxy_set_header Cookie $http_cookie;
	}

    location = /metrics {
        return 301 /metrics/;
    }

    location /metrics/ {
        #limit_req zone=global_zone burst=50 nodelay;

		auth_request /_grafana_auth;
		auth_request_set $grafana_user $upstream_http_x_grafana_user;
		auth_request_set $grafana_role $upstream_http_x_grafana_role;

        set $grafana_service "https://grafana:3000";
        proxy_pass $grafana_service;
        proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header X-WEBAUTH-USER $grafana_user;
		proxy_set_header X-WEBAUTH-ROLE $grafana_role;

        #proxy_redirect / /metrics/;
        proxy_ssl_verify on;
        proxy_ssl_trusted_certificate /certs/${CA_CRT_NAME};

        # WebSocket support — required for Grafana live features
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # Route to Frontend Service
    location / {
        #limit_req zone=global_zone burst=50 nodelay;

        set $frontend_service "https://frontend:443";
        proxy_pass $frontend_service;
        proxy_ssl_verify on;
        proxy_ssl_trusted_certificate /certs/${CA_CRT_NAME};
    }

    # Security Zone (Logins)
    location /api/auth/ {
        #limit_req zone=security_zone burst=5 nodelay;

        set $backend_service "https://backend:8000";
        proxy_pass $backend_service;
        proxy_ssl_verify on;
        proxy_ssl_trusted_certificate /certs/${CA_CRT_NAME};
    }

    # Heavy Lifters (Orders)
    location /api/orders/ {
        #limit_req zone=heavy_zone burst=3 nodelay;

        set $backend_service "https://backend:8000";
        proxy_pass $backend_service;
        proxy_ssl_verify on;
        proxy_ssl_trusted_certificate /certs/${CA_CRT_NAME};
    }

    # Route WebSocket traffic to backend
    location /ws/ {
        set $backend_service "https://backend:8000";
        proxy_pass $backend_service;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 600s;

        proxy_ssl_verify on;
        proxy_ssl_trusted_certificate /certs/${CA_CRT_NAME};
    }

    # Route to Core Backend Service
    location /api/ {
        #limit_req zone=api_zone burst=10 nodelay;

        set $backend_service "https://backend:8000";
        proxy_pass $backend_service;
        proxy_ssl_verify on;
        proxy_ssl_trusted_certificate /certs/${CA_CRT_NAME};
    }
}

#MONITORING
server {
    listen 8443 ssl;
    server_name gateway-internal;

    ssl_certificate     /certs/${INT_CRT_NAME};
    ssl_certificate_key /certs/${INT_KEY_NAME};
    ssl_protocols       TLSv1.2 TLSv1.3;

    location = /stub_status {
        stub_status;
        access_log off;
    }

    location / {
        return 404;
    }
}

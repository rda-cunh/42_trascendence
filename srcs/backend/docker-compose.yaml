services:
  redis:
    image: redis:7-alpine        # alpine ~30MB
    container_name: redis
    restart: always
    expose:
      - "6379"                   # internal only
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  backend:
    container_name: backend
    build: ./app
    environment:
      - INT_CRT_NAME=${INT_CRT_NAME:-internal.crt}
      - INT_KEY_NAME=${INT_KEY_NAME:-internal.key}
      - REQUESTS_CA_BUNDLE=/certs/${CA_CRT_NAME:-ca.crt}
      - DJANGO_SETTINGS_MODULE=backend.settings
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - certs_data:/certs:ro
    restart: always
    depends_on:
      pki-init:
        condition: service_completed_successfully
      data-service:
        condition: service_started
      redis:
        condition: service_healthy
    command: >
      sh -c "
      python3 manage.py makemigrations &&
      python3 manage.py migrate &&
      daphne -e ssl:8000:privateKey=/certs/$${INT_KEY_NAME}:certKey=/certs/$${INT_CRT_NAME}
      backend.asgi:application
      "
